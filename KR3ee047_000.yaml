front:
  text: 劉序雷君少逸衢之名醫也余守是郡因病邀診遂與之善其人秉至性多讀書以醫世其家著作甚富余嘗序其時病論一書行之一日復出其戚金君冶田所藏灸法祕傳見示云得自蜀僧施治頗驗原書譾陋不文經雷君取所列諸證分門而為之說言簡意賅深得經旨誠濟世之良術也檢閲方書其論穴治病則從太乙神針神明而出實近今所罕見之本余恐祕本無傳因付手民以公諸書並附刊太乙神針諸方於後俾閲是書者參互考證而信從焉刊成爰綴數語於簡端以見可傳者之不能終祕亦以嘉雷君與金君之急急於傳也是為序光緒九年十一月望日儘先補用道知衢州府事楚北劉國光賓臣氏撰
