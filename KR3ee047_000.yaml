body:
  text: 凡例一用灸先審其是何病症取何穴道再以病人中指節為一寸量准寸分以墨點其穴候灸一灸法用生薑一大片原二分許將灸盞之足釘在薑片之上照灸盞之孔將銀針穿通薑片平放應灸穴上即將艾絨捏作一團置於盞內再上藥料將艾點燃少頃則藥氣即可透入如覺熱甚難禁可將銀盞提起片時仍即放下看盞內藥將燃盡即取起另換每一次換藥三四回便可收止每日或一次或兩次弗論一用灸宜天氣溫和密室無風之所焚一爐香照法用灸若遇人神所在不宜灸之切須忌避孕婦亦不宜用一灸後必須靜臥片時待其藥氣周流於臟腑脈絡之內自然暢快病出切切慎風節食保精養神為第一著一灸穴宜審輕重上體及當骨處灸宜少下體及肉厚處灸多無害正面圖背面圖指節圖量穴道取寸法以男左女右手中指第二節屈指兩紋尖相去為一寸取稻草心或薄篾片量之若用繩線則有伸縮不準灸盞圖古聖用九針失傳久矣今人偶用者不但不諳針法亦且不熟明堂至於灸法亦然也今用銀盞隔姜灸法萬無一失凡欲用此法者須仿此樣為式四圍銀片稍厚底宜薄須穿數孔下用四足計高一分許將盞足釘在生薑片上姜上亦穿數孔與盞孔相通俾藥氣可以透入經絡臟腑也灸藥神方艾葉一錢五分硫黃乳香沒藥麝香皂角枳殼川芎桂枝杜仲全蠍白芷細辛松香雄黃獨活穿山甲以上各五分上藥稱准分兩各為末和丸固藏弗泄氣方解艾葉揉搗如綿謂之熟艾熟艾性熱能通十二經走三陰以之灸火能除百病硫黃之性純陽能援陽氣暴脫命欲垂危沒藥乳香通行十二經絡麝香皂角宣開上下竅關枳殼破一切氣滯川芎行一切血凝桂枝調衛和營杜仲舒筋壯骨定厥陰之風全蠍有力化癰瘍之毒白芷多功細辛通竅散寒松香祛風止痛雄黃殺百毒獨活搜伏風更以穿山甲通行經絡直達病所方中諸品無處不行所以主治諸疴效如桴鼓人神在曰不宜灸單初一在足大指初二在外踝初三在股內初四在腰初五在口初六在手初七在內踝初八在腕初九在尻初十在腰背十一在鼻梁十二在髮際十三在牙齒十四在胃脘十五在遍身十六在胸十七在氣衝十八在股內十九在足二十在內踝二十一在手小指二十二在外踝二十三在肝及足二十四在手陽明二十五在足陽明二十六在胸二十七在膝二十八在陰二十九在膝脛三十在足趺十二時人神所在不宜針灸歌子踝醜腰寅在目卯面辰頭巳三屬午胸未腹申在心酉背戌頭亥股續十二支曰人神所在不宜針灸歌子不治頭君須認丑日腰耳寅胸應卯日鼻脾辰膝腰巳手午心真捷徑未頭手足申頭背酉行膝背同其類戌日在陰頭面間亥日遊行頭頸位十二支神禁灸歌男除女破應該會十干曰人神所在不宜針灸歌甲不治頭乙耳喉丙肩丁背與心求戊己腹脾庚腰肺辛膝壬當腎脛收癸日不宜針手足十干不犯則無憂尻神圖此神農所置一歲起坤二歲震逐年順飛九宮周而復始行年到處則所主敗切忌針灸慎勿犯之否則變生他病慎之九宮尻神歌尻神所在有根由坤內外踝聖人留震宮牙口腨宜記巽位還居乳口頭中宮肩骨連尻骨背面目從乾上游手膊兌宮難砭灸艮宮腰頂也須休離膝肋脅針難下坎肘還連肚腳求為醫精曉尻神訣萬病無干禁忌憂以上避忌以逐日人神所在為主如遇急病其餘不必避也應灸七十症中風中風者卒然中倒人事無知口眼喎斜是也方書有中經中絡中臟中腑之分醫之乏效者必須用灸或未經療治者急灸無妨當其初中之時先灸百會或灸尺澤如口噤者灸風池左癱右瘓者灸風市如兩額暴痛口眼歪斜牙關緊閉失音不語灸客主人如因痰而中者灸環跳穴可也百會穴從鼻直上入髮際五令旋毛陷中可容指處醫宗金鑑云直上耳尖頂陷中是也尺澤穴肘中動脈處即肘彎內橫紋當中屈肘紋見金鑑云屈肘橫紋筋骨罅中風市穴端立垂手於股外中指尖到處客主人兩耳前骨工宛中間開口即穴處環跳穴在髀樞中側臥屈上足伸下足取之大腿曰股股上曰髀楗骨之下大腿之上兩骨合縫之所曰髀樞當環跳穴處風池穴在耳後陷中按之引耳內尸厥金鑑云尸厥者類中風之稱也謂其形厥而氣不厥口鼻無氣狀類死尸而脈自動也延醫不及急宜灸大敦穴倘有四肢厥冷宜灸內庭又灸行間不可誤也大敦穴足大指端去爪韭菜許毛中金鑑云外側聚毛中內庭穴足大指內次指本節前歧骨外間陷中行間足大指次指歧骨縫間動脈應手陷中偏風偏風者或左肢不遂或右肢不遂在左者為癱血虛也右者為瘓氣虛也左癱右瘓者氣血兩虛也總宜先灸百會次灸合谷如一偏疼痛手臂不仁拘攣難伸灸手之裡兼灸腕骨倘痛甚不能提物灸肩髃兩手攣痛臂細無力灸曲池半身不遂灸環跳按穴灸之自然卻病百會穴見中風合谷大指次指歧骨間陷中即虎口兩叉骨縫中手三里曲池下二寸鋭骨端按之肉起腕骨手外側腕前起骨下陷中即小指直上處肩髃肩端兩骨間曲池屈手按胸肘彎橫紋尖盡處環跳見中風眩暈眩目花也暈頭昏也其病之因有五一曰無痰不眩一曰無火不暈一曰木動生風一曰水不涵木一曰土虛木搖是也醫者莫分藥多罔效灸神庭穴自獲安全若未中機再灸肝俞必驗神庭從鼻上直入髮際五分即眉心上三寸五分肝俞八節下各開二寸痿症經曰肺熱葉焦發為痿躄痿躄者足軟而不能步也其症有五不可不明蓋痿躄屬肺脈痿屬心筋痿屬肝肉痿屬脾骨痿屬腎也總當先灸足三里甚則灸三陰灸法得宜較湯散為勝也足三里膝下三寸䯒外廉以手掌按膝頭中指到處股外旁也膝蓋骨下三寸在䯒骨外廉兩筋肉分宛宛中平坐垂足取之在背金鑑作大筋肉三陰足內踝上三寸大骨下陷中痹症痹者即俗稱為風氣也症由風寒濕之氣雜合為病益風勝為行痹寒勝為痛痹濕勝為著痹往往蔓延不愈倘三氣痹痛灸環跳兼灸脾俞腎俞足痹不仁灸腰俞如手臂作痛不能提舉灸尺澤兩腿麻木不能步履灸風市按圖而灸庶乎肢體自若耳環跳見中風脾俞十脊骨下各開二寸腎俞十三脊下各開二寸亦有一寸半金鑑云與臍平腰俞尾尻骨節上窔間尺澤風市皆見中風勞傷五勞者煩冗勞心謀慮勞肝過思勞脾過憂勞肺色欲勞損七傷者久視傷血久行傷筋久坐傷肉久臥傷氣久立傷骨房勞思慮傷心腎也至於骨蒸勞熱藥石乏效者先灸大椎並灸膽俞久嗽勞熱者灸肺俞久虛不食者灸上脘真氣虛弱者灸氣海男子血損者灸天樞女子陰虛灸足三里凡有一切虛損勞瘵及至形神大憊惟灸膏肓穴可冀挽回否則無救矣大椎三節頸項下第一脊骨上間膽俞第九脊下各開二寸金鑑云各俞皆去脊中二寸故不從寸半之說肺俞三椎骨下兩旁各開一寸五分金鑑云以手搭肩左取右右取左當中指末處上脘臍上五寸氣海臍下一寸五分天樞臍兩旁各開二寸許陷中足三里見痿症膏肓四椎骨下兩旁各開三寸五分金鑑云正坐曲脊從髀骨上角摸索至髀骨下頭其間當有四肋三間按其中一間空處是其穴也咳嗽先賢論咳嗽以有聲為咳有痰為嗽有聲有痰為咳嗽其初起多因於風寒延久多成於虛損若咳甚欲吐灸身柱因痰而嗽灸足三里氣促咳逆覺從左升易於動怒者灸肝俞咳嗽見血者灸肺俞或灸行間吐膿者灸期門日久成勞者灸膏肓弗誤身柱大椎穴下三節骨下間按其窔中足三里見痿症肝俞見眩暈肺俞見勞傷行間見尸厥期門兩乳下第二肋骨端膏肓見勞傷喘症喘病之因有四有因寒邪入肺而喘者有因病阻肺氣而喘者有因水停心下而喘者有因腎不納氣而喘者統宜先灸天突次灸中脘甚則兼灸肺俞所有哮喘不得臥者須灸靈臺行動遂喘急者須灸氣海得能按穴灸之去沉疴猶拔刺耳天突結喉下二寸陷中中脘臍上四寸肺俞見勞傷靈臺六節骨下窔中氣海見勞傷血症書謂吐血成升斗者屬胃血也其餘咯血屬心嘔血屬肝咳血屬肺唾血屬腎凡有一概血症總當先灸膽俞血痰灸其上脘咯血喉中有聲灸其天突如五勞七傷諸虛百損而患血者灸其膏肓弗可緩也據管見暴患之血症實火為多不宜輒灸灸患之血症虛火不少用灸無妨切須辨之膽俞上脘並見勞傷天突見喘症膏肓見勞傷汗症汗有自盜之分不可以不知也蓋自汗為陽虛不因勞動而自出也盜汗為陰虛睡而汗出醒而收也灸其尺澤可以奏勳設未效者膈俞灸之必然全愈尺澤見中風膈俞七脊下各開二寸正坐取之肺痿久嗽肺虛而成肺痿痿者萎也猶枝葉之萎落也時吐涎沫聲音不揚或嗽血絲形容枯槁斯症屬虛者多非肺癰屬實之可比當先灸其肺俞兼灸膏肓可也肺俞膏肓皆見勞傷肺癰久咳不已胸中隱隱而疼吐痰腥臭或吐血膿是為肺癰癰者壅也良由風寒內郁郁久成火火刑金臟而成法當灸其天突兼服清肺之方庶幾有效天突見喘症驚悸怔忡正傳曰驚悸者忽然若有驚惕惕然心中不寧其動也有時怔忡者心中惕惕然動搖不靜其作也無時醫家雖有辨別總灸上脘穴為宜上脘見勞傷健忘忘前失後曰健忘也良由精神短少神志不交所致亦有因思慮過度者或因所願不遂者或因痰溷心者包病因雖異皆當灸百會一穴而記憶自強矣百會見中風陽痿陽痿者陽物痿軟而不舉也年老之人則常有之若少壯之人是為真火衰憊法當灸其氣海氣海見勞傷陰痿陽物收縮卵陰入腹皆為陰症也法宜先灸氣海再灸大椎氣海見勞傷大椎見尸厥臌脹倪氏論臌有氣血蟲水單是也論脹有寒熱虛實濕食瘀積肝腎是也方家必分五臌若何十脹若何余謂臌脹在上灸於上脘在中灸於中脘在下灸於下脘或灸氣海至若脹及兩脅者灸於期門脹及背腰者灸於胃俞脹至兩腿者灸足三里脹至兩足者灸行間可也上脘見勞傷中脘見喘症下脘臍上二寸氣海見勞傷期門見喘症胃俞十一節下各開二寸足三里見痿症行間見尸厥腫滿先聖曰諸濕腫滿皆屬於脾蓋脾主水穀虛而失運水穀停留故成腫滿也後賢分而為四一曰水腫皮薄色嫩按之成凹也一曰氣腫皮厚色蒼按之即起也一曰風腫走注腫疼皮膚麻木也一曰瘀腫腫而紅亮有血縷痕也以上諸腫宜灸內庭如罔驗者行間大敦皆可灸之內庭行間大敦三穴皆見尸厥癥瘕症有七蚊蛇鱉蝨肉米發也瘕有八青黃燥血脂狐蛇鱉也其實症者徵也有塊可徵瘕者假也假物成形總之不外乎氣血交滯倘因氣滯而成者灸氣海因血凝而致者灸天樞可耳氣海天樞並見勞傷痃癖痃者弦也有若弓弦腹有一條扛起現於肌肉之外癖者僻也隱僻於膂脊腸胃之後皆宜灸下脘或灸足三里下脘見臌脹足三里見痿症疝氣疝有七寒水氣血筋狐㿗是也時俗統稱為小腸氣張子和謂疝氣雖有七種總不離乎肝病也七疝之症先宜灸氣海繼宜灸中極或灸三陰若陰囊偏腫者灸大敦有效氣海見勞傷中極臍下四寸三陰見痿症大敦見尸厥伏梁伏梁者心積也起於臍上大如臂上至心下久則令人煩心當灸上脘或灸中脘可安上脘見勞傷中脘見喘症奔豚奔豚者腎積也發於少腹上至於心如豚奔走狀上下無時久則喘逆骨痿少氣先灸氣海兼灸中極為是氣海見勞傷中極見疝氣腳氣腳氣者兩腳浮腫而重濕腳氣也不紅不腫而痛乾腳氣也不拘乾溼皆宜灸風市灸倘或紅腫行步艱難灸大敦穴可愈風市見中風大敦見尸厥腹鳴腹鳴者腹中鳴響也其因痰飲者灸上脘因胃寒而腸鳴者灸胃俞穴或灸足三里上脘見勞傷胃俞見臌脹足三里見痿症噎膈噎膈之因有五有氣滯者有血瘀者有火炎者有痰凝者有食積者雖分五種總屬七情之變凡藥不能效者上宜灸天突中宜灸中脘下灸足三里為要天突中脘見喘症足三里見痿症反胃反胃者飲食能入入而反出故曰反胃良由脾胃陽虛運行失職不能熟腐水穀變化精微朝食暮吐暮食朝吐即王太僕云食入反出是無火也法當灸中脘下脘兼灸膈俞若未效者再灸脾俞胃俞甚則灸足三里中脘見喘症下脘見臌脹膈俞見汗症脾俞見痹症胃俞見臌脹足三里見痿症霍亂霍亂症猝然心腹作痛上吐下瀉謂之濕霍亂也欲吐不吐欲瀉不瀉謂之乾霍亂也急灸期門可愈期門見臌脹頭痛頭痛者有外感內傷之分如痛無休息者為外感時痛時止者屬內傷若因頭風而痛宜灸百會並灸神庭合谷膽俞皆可灸之若頭痛如破或因內傷宜灸命門自痊百會見中風神庭見眩暈合谷大指次指歧骨間陷中即虎口兩骨縫中膽俞見勞傷命門十四節骨下窔中心腹痛真心痛者不可治今云心痛者皆胸中胃脘痛也若胸腹痛者灸上脘痛而不已灸行間並灸膈俞臍下冷痛灸氣海關元少腹寒痛灸中極夾臍而痛上衝心痛灸天樞上脘見勞傷行間見尸厥膈俞見汗症氣海見勞傷中極見疝氣天樞見勞傷關元臍下三寸背痛太陽之脈行身之背忽被風濕所侵則背膂強痛宜灸身柱則瘳身柱見咳嗽脅痛脅痛在左肝經受邪在右肝邪入肺宜灸臨泣可愈臨泣從兩目中直上入髮際五分陷中腰痛腰痛有四當分灸之如因房勞過度則腎虛灸腎俞穴偶然欲跌則閃挫灸氣海穴負重損傷不能轉側灸環跳穴濕氣下注不能俯仰灸腰俞穴倘連腹而引痛者灸命門穴則安腎俞見痹症氣海見勞傷環跳見中風腰俞見痹症命門見頭痛耳聾耳鳴繩墨曰腎氣充盛則耳聰腎氣虛敗則耳聾腎氣不足則耳鳴腎氣結熱則耳聾經謂耳為腎竅腎虛耳聾宜灸腎俞耳鳴宜灸風池初患者先灸百會為是腎俞見痹症風池百會並見中風目疾眼科治目有五輪之分兩眥屬心曰血輪烏珠屬肝曰風輪兩胞屬脾曰肉輪白精屬肺曰氣輪瞳神屬腎曰水輪其實肝開竅於目總病實在乎肝目初病者先灸百會上星神庭三穴日久內障起翳者當灸臨注目䀮䀮而不了者必須灸腎俞也百會見中風上星從髮際直上一寸或眉心上四寸神庭見頭痛臨泣見脅痛腎俞見痹症咽喉咽乃飲食之道喉乃呼吸之區不容纖邪所容否則遂成喉症矣咽喉疼痛者當灸內庭喉瘡喉風者當灸天突為亟內庭見尸厥天突見喘症齒痛齒乃骨之餘腎主病也然則因陽明火熾而痛者有因風因蟲而痛者亦有因虛而痛者方藥莫能奏捷必當用灸倘頰腫牙痛灸風池紅腫牙痛灸手三里齒齲須灸內庭也風池見中風手三里見偏風內庭見尸厥鼻血鼻血者因於肺肝有火也肺竅在鼻肝臟藏血二經有火內熾則血沸騰乘肺竅而出者也急宜灸合谷穴一壯合谷穴見偏風腦漏膽移熱於腦腦漏黃濁之水由鼻而出甚則腥穢亦有鼻塞不聞香臭者均宜灸上星穴可也上星見目病脫頦頦者口之下唇至末之處俗名下巴也有因氣虛而脫者有因呵缺而脫者皆可灸風池穴風池見中風遺精書謂有夢精出為夢遺無夢自遺為精滑大凡夢遺者由於相火之強精滑者由於心腎之損擬方當分虛實灸法統宜於關元中極及之陰交設未瘥者再灸腎俞可耳關元見心腹痛中極見疝氣三陰交見痿症腎俞見痹症濁症丹溪曰濁症之因有二肥人多濕熱瘦人多腎虛總之腎虛之質下焦空豁則濕熱阻於精竅而成赤白濁也當灸關元兼灸行間自痊關元見心腹痛行間見尸厥淋痛滴瀝澀痛謂之淋急滿不通謂之閉五淋之別雖有氣砂血膏勞之異然皆腎虛而膀胱生熱也若小便赤澀灸其下脘小便痛瀝灸其關元五淋之症皆宜灸其中極下脘見臌脹關元見心腹痛中極見疝氣溺血經謂胞移熱於膀胱則溺血是症未有不本於熱者當灸關元數忙關元見心腹痛遺溺遺溺者由於中氣虛衰不能攝固所致老年下元不足孩提脬氣未固多有之總當灸其三陰若小便頻數者灸大敦小兒遺尿者灸氣海三陰見痿症大敦見尸厥氣海見勞傷便血便血之症有腸風有臟毒如下鮮血大便燥結名曰腸風血色黯濁大便溏瀉名曰臟毒臟毒者灸腎俞腸風者灸會陽腎俞見痹症會陽尾尻骨兩旁各開二寸尻骨節上兩旁各開寸半亦可脫肛肺與大腸相為表裡故肺熱則肛藏肺虛則肛脫或因腸風痔漏或因久痢久瀉或因産婦用力太早或因小兒叫啼傷氣總須上灸百會下灸會陽百會見中風會陽見便血痔瘡古人論痔有牝牡蟲血之分其實皆大腸積熱所致當灸會陽幾壯庶冀而安會陽見便血泄瀉泄瀉有五乃脾虛腎虛濕寒濕熱食積也脾虛則食少便頻腎虛則五更作瀉濕寒則便溏溺白濕熱則下利腸垢食瀉則吞酸噯腐在醫家當分而治在灸家先取天樞其次會陽之穴天樞見勞傷會陽見便血痢疾古人以赤痢為濕熱傷於血分白痢為濕寒傷於氣分凡初患赤白痢積者法當灸其天樞兼之中脘如日久不愈脾腎兩傷者當灸脾俞兼之會陽也天樞見勞傷中脘見喘症脾俞見痹症會陽見便血傷寒傷寒者由冬令傷於寒邪法當辛散其誤治也變為結胸宜灸期門若婦人經水適來邪熱入於血室晝則明瞭夜則譫語亦灸期門之穴若飲水過多腹脹者灸其中脘餘熱解不盡者當灸曲池可也期門見咳嗽中脘見喘症曲池見偏風熱病經曰冬傷於寒春必病溫至夏為熱病熱病者皆傷寒之類也當用辛涼之劑設未效者當灸上脘若煩悶者須灸行間上脘見勞傷行間見尸厥瘧疾瘧疾之病由夏令先受暑邪至秋時發為瘧疾秋風欲入伏暑欲出表裡交爭寒熱成矣連日發者則淺隔日發者則深隔兩日發者則更深矣諸般瘧疾法當先灸大椎痰盛之體灸其尺澤日久不已灸其內庭按穴灸之則瘧自遁大椎見勞傷尺澤見中風內庭見尸厥黃疸黃疸有五曰陽黃陰黃酒疸谷疸及女勞疸其病本皆不離乎濕也應灸之穴有四即上脘肝俞膽俞脾俞是也上脘見勞傷肝俞見眩暈膽俞見勞傷脾俞見痹症癲病經謂重陰者癲癲則多喜若癡若呆或笑或泣緣於所謀不遂而致也當灸身柱一穴身柱見咳嗽癇症癇症者忽倒無知神昏牙閉角弓反張抽搐流涎古人分為五癇有馬鳴羊嘶牛吼犬吠豬啼等語究屬痰涎蓄於經絡也灸家不須細別當其初發之時先灸百會兼灸上脘每發每灸日漸自瘥百會見中風上脘見勞傷癩病癩病癘風也俗稱為大麻風良由濕勝則生風風勝則生蟲所以皮膚脫落肌肉浮紫滿軀作癢狀若蟲行宜灸曲池可愈曲池見偏風疹病肌發紅點有若蚊咬者為熱疹細粒透顯者為風疹不透出者為隱疹隱疹宜灸曲池風疹熱疹宜乎合谷環跳曲池見偏風合谷見偏風環跳見中風痰疾痰屬濕津液所化也流則為津行則為液聚則為痰上則為涎其實百病兼痰為多也灸其上脘痰自化矣上脘見勞傷飲食胃司納受脾主消導一納一消運行不息設脾胃衰弱則失消納之權若飲食不思灸其上脘飲食少減灸其中脘飲食不化灸其下脘或灸天樞食不下欲乾嘔者宜灸膽俞穴也上脘見勞傷中脘見喘症下脘見臌脹天樞見勞傷膽俞見勞傷調經月經者一月一至也超前退後謂云不調女子經水不調者當灸氣海兼灸中極婦人月水枯閉者當灸腰俞可愈氣海見勞傷中極見疝氣腰俞見痹症血崩血崩之症良由肝脾兩傷蓋肝不能藏脾不能統所以經血忽崩宜灸氣海大敦二穴氣海見勞傷大敦見尸厥帶下古人治帶有五色之論而分五臟之療又以赤屬血白屬氣之說其實帶下之病本在乎帶脈以帶脈橫於腰間如束帶然故名也法當灸關元數壯關元見心腹痛種子女子不孕之故由傷其衝任也若三因之邪傷其衝任之脈則有月經不調漏崩帶下或因宿血積於胞中或因胞寒胞熱或因體盛痰多脂膜壅塞胞中皆不能成孕也當灸中極為要中極見疝氣胎漏懷胎數月而經水偶下者謂之胎漏也由於勞力損傷或由衝脈有熱或由氣怒傷肝皆能致之也宜灸關元自止關元見心腹痛産後産後之疴莫能盡述應灸之症姑略詳之惡露不行宜灸中極惡露不止宜灸氣海或灸關元關元中極只離一寸一欲其行一欲其止分寸不準災害並至矣中極見疝氣氣海見勞傷關元見心腹痛胞衣不下胞衣停滯者或因氣力疲敗或因惡露所阻皆令不下也服諸藥罔效者當灸中極立下中極見疝氣驚風驚風者有急慢之分焉急驚者忽然搐搦身體壯熱面紅唇赤牙閉痰迷兼之二便不通宜灸身柱曲池慢驚者緩緩搐搦身體溫和面色淡黃或睡露睛兼之大便青色宜灸腕骨尺澤若閉目搖頭額汗昏睡面青肢厥頻吐清水此慢脾風不可救也身柱見咳嗽曲池見偏風腕骨手外側腕前起骨下陷中即小指直上處尺澤見中風疳勞小兒疳勞之症面黃形瘦肚大露筋尿如米泔午後潮熱皆因肥甘無節停滯中州傳化遲滯腸胃內傷則生積熱熱盛生疳宜灸下脘胃俞自然告痊下脘胃俞並見臌脹以上七十症按穴灸之自無差忒若遇跌打損傷瘀血疼痛痰核癧串無名腫毒皆於患處灸之使痛者灸至不痛不痛者灸至痛即愈太乙神針藥方艾絨三兩硫黃麝香乳香沒藥丁香松香桂枝杜仲枳殼皂角細辛芎藭獨活雄黃炮甲以上各一錢上藥各稱足為末與艾絨揉和用綿夾絨一張約長五寸寬方尺將絨藥鋪摻於紙上用力實卷如大指粗即為一條如絨藥尚多即多作幾條外再加紙三四層裹之以雞子清通刷外層三次陰乾收藏勿使泄氣用針法一用針先審病證取何穴道用墨塗記其上以紅布七層蓋穴上候針一將針向燈燭上燒透對準穴道放於紅布上若覺大熱將針略提起俟熱定再針以七記數小則一七多則七七亦可一用過藥針以極干竹筒封藏猶可後用穴道取寸法以男左女右手中指第一節第二節相去為一寸圖見前正面穴道證治圖見前百會穴從鼻直上入髮際五寸旋毛陷中可容指處督脈凡中風頭風風癲角弓反張忘前失後氣絶脫肛目淚耳聾針此穴上星穴從髮際直上一寸宜上可容豆處督脈凡腦冷鼻塞腦漏汗不出目睛痛針此穴神庭穴從鼻上直入髮際五分督脈凡頭疼目眩出淚流涕針此穴天突穴結喉下二寸陷中低首取之任脈凡喉瘡喉風哮喘氣噎肺癰咯血喉中有聲針此穴上脘穴臍上五寸任脈凡心腹疼痛驚悸痰疾伏梁氣蠱狀如覆盆風癇等徵針此穴中脘穴臍上四寸任脈凡反胃吐食心下脹滿狀如伏梁傷寒飲水過多腹脹氣喘寒癖針此穴下脘穴臍上二寸任脈凡腹脹堅硬痃癖氣塊小便赤澀身體羸瘦針此穴氣海穴臍下一寸五分任脈凡男子陽事久憊婦人經水不調及滯氣成塊狀若覆盆針此穴關元穴臍下三寸任脈凡男子遺精白濁臍下冷痛小便痛澀婦人赤白帶下經水不調針此穴中極穴臍下四寸任脈凡男子奔豚搶心遺瀝失精五淋七疝小便赤澀婦人經水不調不受胎孕針此穴臨泣穴從目中上入髮際五分陷中即臨泣穴足少陽凡目痛內障赤白翳腋腫脅下痛針兩穴客主人一名上關穴耳前骨上宛中間開口即空處足少陽凡兩額暴痛口眼歪斜牙關緊閉失音不語針兩穴期門穴乳下第二肋疼骨端足厥陰凡傷寒結脅咳嗽吐膿腹膨霍亂吐瀉婦人熱入血室産後飲食不調針兩穴天樞穴臍兩旁各開二寸足陽明凡夾臍痛沖少腹赤白痢疾泄瀉飲食不化男子血損婦人血塊針兩穴肩髃穴肩端兩骨間陷中舉臂取之手陽明凡手臂痠痛不能提物針兩穴曲池穴屈手按胸肘彎橫紋尖盡處手陽明凡偏風不遂兩手拘攣臂細無力肘內寒冷而痛針兩穴手三里穴曲池下二寸鋭肉端手陽明凡手臂不仁肘攣疼痛頰頷紅腫齒痛瘰癧針兩穴風市穴膝上七寸外廉兩筋間端立垂手於股中指尖到處足少陽凡兩腿麻木左癱右瘓一切腳氣針兩穴內庭穴足次指三指歧骨陷中足陽明凡水腫厥逆咽喉痛久瘧不食惡聞人聲口歪齒齲針兩穴行間穴足大指次指歧骨縫間動脈應手陷中足厥陰凡白濁尿難腹脹心疼咳逆吐血煩悶短氣手足浮腫四肢厥冷針兩穴大敦穴足大指端去爪甲韭葉許三毛中足厥陰凡小腸疝氣小便頻數陽上入腹陰痛偏大臍腹腫脹而痛尸厥如死腳氣紅腫婦人血崩針兩穴背面穴道證治圖見前大椎穴第三節頸骨下第一節上間督脈凡勞疾遍身發熱諸瘧針此穴身柱穴大椎穴下三節骨下間督脈凡脊膂強痛咳吐瘛瘲發熱針此穴命門穴十四節骨下間督脈凡腰腹引痛頭疼如破裡急瘛瘲針此穴肺俞穴三椎骨下兩旁各開二寸足太陽凡傳尸骨蒸肺痿吐血咳嗽氣喘針兩穴風池穴耳後陷中按之引耳內足少陽凡耳聾虛鳴脫頷口噤頰痛牙疼並腫針兩穴膏肓穴四椎節下兩旁各開三寸五分足太陽凡勞傷虛損肺痿咯血咳嗽吐痰寒熱四肢無力針兩穴脾俞穴十一椎節下兩旁各開二寸足太陽凡諸般黃疸四肢不收痹痛膈疼泄痢翻胃積聚疾瘧針兩穴腎俞穴十四椎節下兩旁各開二寸足太陽凡腰痛如折便血出精陰痛身熱耳聾目䀮膝攣足寒針兩穴環跳穴在髀樞中側臥屈上足伸下足取之大腿曰股股上曰髀楗骨之下大腿之上兩骨合縫之所曰髀樞當環跳穴處也楗健上聲足少陽凡中風中痰半身不遂腰胯強直股痛引肋不得轉身針兩穴會陽穴尾尻骨兩旁各開二寸足太陽凡痔瘡腸澼兩腎尖痛久瀉久痢陰汗濕癢脫肛針兩穴足三里穴膝下三寸䯒外廉以手掌按膝頭中指尖到處股外旁也足陽明凡翻胃氣膈腸鳴膨脹痃癖胸胃畜血咳嗽稠痰足痿失屐針兩穴太乙神針正面背面穴道詩看穴先准鼻當中上入髮際三穴蹤神庭入發五分上星入發倍一寸百會入發五寸旋毛宮三穴俱督脈天突在結喉下二寸陷中三脘音管胃上中下臍上量平聲以通上脘五寸中漸減中四下二勿朦朧氣海臍下寸餘五關元即丹田兩股三寸足函容再下又加其一寸穴稱中極當中窮七穴俱任脈左右兩旁共臨泣足少陽從目中直上入發五十釐兩客主人足少陽耳前骨開口即空而便知期門足厥陰在乳下第二肋疼骨之端試揣之天樞足陽明以臍為則子兩旁二寸各開馳肩髃肩端兩骨縫肘彎有穴視茫微肘彎橫紋尖盡處必須屈手按胸乃見紋尖之曲池曲池之下手三里三穴俱手陽明曲池相去二寸鋭肉端頭視次平聲正坐垂手兩股間中指尖處風市上聲足少陽歸內庭足陽明乃在兩足指次三歧骨陷中耳大指次指動中間謂之行間須載記再若大指去爪甲如韭葉許從三毛中大敦二穴俱是厥陰是大椎以上有二骨為項二骨大椎自項骨算起大椎當第三以下為脊骨第一第三節下身柱名十四節下命門三穴具督脈地風池足少陽耳後寸半陷中存按之則引耳內知的實肺俞在兩飯匙骨縫中脾俞腎俞三穴俱足太陽場脊骨各開二寸切言不移脊骨第三椎下為肺十一脾十四又將腎俞列四椎節下號膏肓足太陽各開三寸五分疆環跳音條足少陽正在髀樞處務要側身眠在床伸其下足屈上足以取之乃可識其鄉尻骨兩邊各開二寸問訊穴名曰會陽陰足太陽膝下三寸外廉畔足三里足陽明與手殊方掌按膝頭中指尖盡處誨人認法劇精詳穴道取寸法折衷男左女右手指中中指第一第二節相距即寸於此逢按穴治病針無不愈方自範育䭲而後王大德沈士元周雍和諸人皆用之實豫人以易從切勿以其淺近而忽之也此法及詩自古今醫詩集中録出劉國光識附雷火針法治一切閃挫諸骨節痛及寒濕諸氣而畏刺者方用沉香木香乳香茵陳羌活乾薑穿山甲以上各三錢麝少許祁艾二兩以綿紙半尺先鋪艾茵於上次將各藥末摻上卷極緊收用按定痛穴筆點記外用紙六七層隔穴將卷取太陽真火用圓珠火鏡皆可燃紅用燈燭燒燃亦可按穴上良久取起剪去灰再燒再按九次即愈灸一次念咒一遍先燃火在手念咒曰雷霆官將火德星君藥奏奇功方得三界六腑之神針藏烈焰煉成於仙都九轉之門蠲除痛患掃蕩妖氛吾奉南斗六星太上老君急急如律令咒畢即以雷火針按穴灸之此乃孫真人所制流傳至今頗為靈驗製藥時毋令婦女雞犬見其方載針灸大全又按御纂醫家金鑑有雷火神針方藥只三味歌曰雷火神針攻寒濕附骨疽痛針之宜丁麝二香共祁艾燃針痛處功效奇景嶽新方因陳內亦有二方注明治風寒濕毒之氣留滯經絡而為痛為腫不能散者其一於五月五日取東引桃枝玄皮長一二寸兩頭削如雞子尖向燈上燃著隨子患處隔紙數層以針按灸一則方法藥味與太乙神針相同惟多白芷一味蓋命名雖異而治病則有同功焉
